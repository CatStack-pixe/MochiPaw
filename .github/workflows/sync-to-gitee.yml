name: Sync Github Repos To Gitee
on:
  push:
    branches:
      - master

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check Gitee credentials
        id: gitee-credentials
        env:
          GITEE_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          if [ -n "$GITEE_PRIVATE_KEY" ] && [ -n "$GITEE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Gitee credentials are not configured; skipping mirror sync."
          fi

      - name: Sync Github Repos To Gitee
        if: steps.gitee-credentials.outputs.available == 'true'
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/ABI-ZTROS
          dst: gitee/ABI-ZTROS
          src_token: ${{ secrets.GITHUB_TOKEN }}
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: BongoCat
          force_update: true
