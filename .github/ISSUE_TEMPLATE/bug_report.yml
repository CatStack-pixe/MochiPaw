name: Bug report
title: '[bug] '
description: Report a bug
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Before opening a report:

        1. Search existing issues: https://github.com/CatStack-pixe/MochiPaw/issues
        2. Make sure you are using the latest release: https://github.com/CatStack-pixe/MochiPaw/releases/latest
        3. Check whether the issue is caused by another app or system-level tool.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug. Add screenshots or video if they help.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.

  - type: textarea
    id: info
    attributes:
      render: text
      label: App information
      description: Copy the app information from Preferences > About.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other details that may help with diagnosis.
